name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Unit tests, lint, and debug builds
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          log-accepted-android-sdk-licenses: "false"
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;35.0.0
            ndk;26.1.10909125

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Assemble instrumentation APK
        run: ./gradlew --no-daemon :app:assembleDebugAndroidTest
